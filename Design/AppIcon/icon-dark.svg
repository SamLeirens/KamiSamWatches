<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#131120"/>
      <stop offset="1" stop-color="#221E38"/>
    </linearGradient>
    <linearGradient id="glyph" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#A395FF"/>
      <stop offset="1" stop-color="#6C5BE8"/>
    </linearGradient>
    <radialGradient id="halo" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8B7CF5" stop-opacity="0.28"/>
      <stop offset="0.7" stop-color="#8B7CF5" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#8B7CF5" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1024" height="1024" fill="url(#sky)"/>
  <!-- stars -->
  <circle cx="150" cy="150" r="8" fill="#8B7CF5" opacity="0.6"/>
  <circle cx="260" cy="245" r="6" fill="#8B7CF5" opacity="0.4"/>
  <circle cx="760" cy="120" r="6" fill="#8B7CF5" opacity="0.4"/>
  <circle cx="872" cy="185" r="9" fill="#8B7CF5" opacity="0.55"/>
  <circle cx="922" cy="330" r="6" fill="#8B7CF5" opacity="0.35"/>
  <circle cx="108" cy="335" r="7" fill="#8B7CF5" opacity="0.4"/>
  <!-- moon: soft halo + disc -->
  <circle cx="512" cy="450" r="340" fill="url(#halo)"/>
  <circle cx="512" cy="450" r="250" fill="#8B7CF5" opacity="0.20"/>
  <!-- torii: kasagi (curved top), gakuzuka (center strut), nuki (tie beam), pillars -->
  <path d="M 165 400 Q 512 308 859 400" fill="none" stroke="url(#glyph)" stroke-width="68" stroke-linecap="round"/>
  <line x1="512" y1="360" x2="512" y2="500" stroke="#8F7FF7" stroke-width="36"/>
  <rect x="248" y="492" width="528" height="46" rx="23" fill="#8F7FF7"/>
  <line x1="330" y1="428" x2="306" y2="872" stroke="url(#glyph)" stroke-width="62" stroke-linecap="round"/>
  <line x1="694" y1="428" x2="718" y2="872" stroke="url(#glyph)" stroke-width="62" stroke-linecap="round"/>
</svg>
